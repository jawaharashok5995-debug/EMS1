/* ================= AUTH ================= */
function quickLogin(u,p){ document.getElementById('loginUser').value=u; document.getElementById('loginPass').value=p; doLogin(); }
function doLogin(){
  const u=document.getElementById('loginUser').value.trim();
  const p=document.getElementById('loginPass').value;
  const user=DB.users.find(x=>x.username===u && x.password===p);
  if(!user){ document.getElementById('loginError').classList.remove('hidden'); return; }
  SESSION={userId:user.id,loginAt:new Date().toISOString()};
  saveSession(); initApp();
}

/* ================= USAGE HOURS ================= */
function getUsageHours(eq){
  let hours = eq.baseUsageHours || 0;
  if(eq.status==='Running' && eq.runningStartISO){
    const hrs = (new Date()-new Date(eq.runningStartISO))/(1000*60*60);
    hours += hrs;
  }
  return Math.round(hours);
}
function setEquipmentStatus(id, newStatus){
  const eq = DB.equipment.find(e=>e.id===id);
  if(!eq)return;
  // If was running, accumulate hours
  if(eq.status==='Running' && eq.runningStartISO){
    const hrs=(new Date()-new Date(eq.runningStartISO))/(1000*60*60);
    eq.baseUsageHours=(eq.baseUsageHours||0)+hrs;
    eq.runningStartISO=null;
  }
  eq.status=newStatus;
  // If now running, record start time
  if(newStatus==='Running') eq.runningStartISO=nowISO();
  save();
}

/* ================= NOTIFICATIONS ================= */
let allNotifs=[];
function buildNotifications(){
  const list=[];
  DB.pmSchedules.forEach(p=>{
    const eq=DB.equipment.find(e=>e.id===p.equipmentId);
    const d=diffDays(p.nextDue);
    if(d<0) list.push({type:'pm',subtype:'overdue',text:`PM Overdue: ${eq?.name} — ${p.task} (${Math.abs(d)}d)`,color:'red'});
    else if(d<=7) list.push({type:'pm',subtype:'soon',text:`Upcoming PM: ${eq?.name} in ${d} days — ${p.task}`,color:'yellow'});
  });
  DB.calibrations.forEach(c=>{
    const eq=DB.equipment.find(e=>e.id===c.equipmentId);
    const d=diffDays(c.nextDue);
    if(d<0) list.push({type:'cal',subtype:'expired',text:`CAL Expired: ${eq?.name} — ${c.parameter} (${Math.abs(d)}d ago)`,color:'red'});
    else if(d<=30) list.push({type:'cal',subtype:'soon',text:`CAL Expiring: ${eq?.name} — ${c.parameter} in ${d} days`,color:'yellow'});
  });
  DB.breakdowns.filter(b=>b.status!=='Resolved'&&b.priority==='High').forEach(b=>{
    const eq=DB.equipment.find(e=>e.id===b.equipmentId);
    list.push({type:'other',text:`High Priority Breakdown: ${eq?.name}`,color:'red'});
  });
  DB.spares.filter(s=>s.stock<=s.minStock).forEach(s=>{
    list.push({type:'other',text:`Low Stock: ${s.name} (${s.stock} ${s.unit})`,color:'yellow'});
  });
  DB.amcs.filter(a=>diffDays(a.endDate)<=30).forEach(a=>{
    const eq=DB.equipment.find(e=>e.id===a.equipmentId);
    const d=diffDays(a.endDate);
    list.push({type:'other',text:d<0?`AMC Expired: ${eq?.name}`:`AMC Expiring: ${eq?.name} in ${d} days`,color:d<0?'red':'yellow'});
  });
  allNotifs=list;
  return list;
}
function filterNotif(f){
  notifFilter=f;
  ['all','pm','cal','other'].forEach(k=>{ document.getElementById('nf'+k.charAt(0).toUpperCase()+k.slice(1)) .className='px-3 py-1 text-xs rounded-full font-semibold '+(f===k?'bg-gray-800 text-white':'bg-gray-100 text-gray-600'); });
  renderNotifList();
}
function renderNotifList(){
  const list=allNotifs.filter(n=>notifFilter==='all'||n.type===notifFilter);

}

function readFileB64(inputEl, cb){
  const file=inputEl.files[0];
  if(!file){cb(null,null);return;}
  if(file.size>2*1024*1024){alert('File too large. Max 2MB for local storage.');cb(null,null);return;}
  const reader=new FileReader();
  reader.onload=e=>cb(e.target.result,file.name);
  reader.readAsDataURL(file);
}

function eqSave(ev,id){
  ev.preventDefault();
  const f=Object.fromEntries(new FormData(ev.target).entries());
  f.cost=Number(f.cost); f.expectedLifespanHours=Number(f.expectedLifespanHours); f.baseUsageHours=Number(f.baseUsageHours);
  if(id){
    const old=DB.equipment.find(x=>x.id===id);
    const prevStatus=old.status;
    if(prevStatus==='Running'&&old.runningStartISO&&f.status!=='Running'){
      const hrs=(new Date()-new Date(old.runningStartISO))/(1000*60*60);
      f.baseUsageHours=Number(f.baseUsageHours)+hrs;
      f.runningStartISO=null;
    }
    if(f.status==='Running'&&prevStatus!=='Running') f.runningStartISO=nowISO();
    Object.assign(old,f);
  } else {
    DB.equipment.push({...f, runningStartISO:f.status==='Running'?nowISO():null});
  }
  save(); closeModal(); navigate('equipment'); refreshNotif();
}
function eqDelete(id){ if(!confirm('Delete this equipment? All linked records remain.'))return; DB.equipment=DB.equipment.filter(e=>e.id!==id); save(); closeModal(); navigate('equipment'); }

  const fileInput=document.getElementById('pmFileInput');
  function finish(attachment,attachmentName){
    if(editId){
      const existing=DB.pmSchedules.find(x=>x.id===editId);
      Object.assign(existing,{...f,attachment:attachment||existing.attachment,attachmentName:attachmentName||existing.attachmentName});
    } else {
      DB.pmSchedules.push({id:'PM-'+String(DB.pmSchedules.length+1).padStart(3,'0'),...f,lastDone:todayISO(),status:'Scheduled',attachment,attachmentName,completedDate:null});
    }
    save(); closeModal(); navigate('pm'); refreshNotif();

  if(fileInput&&fileInput.files[0]){

  }

function pmCompleteConfirm(ev,id){
  ev.preventDefault();
  const f=Object.fromEntries(new FormData(ev.target).entries());
  const fileInput=document.getElementById('pmDoneFile');
  function finish(attachment,attachmentName){
    const p=DB.pmSchedules.find(x=>x.id===id);
    const freqDays={Weekly:7,Monthly:30,Quarterly:90,'Half-Yearly':180,Yearly:365}[p.frequency]||30;
    p.lastDone=f.completedDate||todayISO();
    p.nextDue=daysFromNow(freqDays);
    p.status='Scheduled';
    p.completedDate=f.completedDate||todayISO();
    if(attachment){p.attachment=attachment;p.attachmentName=attachmentName;}
    DB.history.push({id:'H-'+String(DB.history.length+1).padStart(3,'0'),equipmentId:p.equipmentId,date:f.completedDate||todayISO(),type:'PM',description:p.task,technician:techName(p.assignedTo),partsUsed:f.partsUsed||'-',cost:Number(f.cost)||0});
    save(); closeModal(); navigate('pm'); refreshNotif();
  }
  if(fileInput&&fileInput.files[0]) readFileB64(fileInput,(d,n)=>finish(d,n));
  else finish(null,null);
}

/* ---- PM TRACKING ---- */
RENDERERS.pmtracking=function(){
  const overdue=DB.pmSchedules.filter(p=>diffDays(p.nextDue)<0);
  const upcoming=DB.pmSchedules.filter(p=>diffDays(p.nextDue)>=0&&diffDays(p.nextDue)<=30);
  const compliant=DB.pmSchedules.filter(p=>diffDays(p.nextDue)>30);
  const overduePct=Math.round(overdue.length/Math.max(1,DB.pmSchedules.length)*100);
  const months6=[];
  for(let i=5;i>=0;i--){const d=new Date();d.setMonth(d.getMonth()-i);months6.push(d.toISOString().slice(0,7));}
  const pmDone=months6.map(m=>DB.history.filter(h=>h.type==='PM'&&h.date.startsWith(m)).length);
  const pmPlan=months6.map(m=>DB.pmSchedules.filter(p=>p.nextDue&&p.nextDue.startsWith(m)).length+pmDone[months6.indexOf(m)]);

  document.getElementById('pageContent').innerHTML=`
    <div class="grid grid-cols-3 gap-4 mb-5">
      <div class="bg-red-50 border border-red-200 rounded-xl p-4 text-center">
        <p class="text-3xl font-bold text-red-700">${overdue.length}</p>
        <p class="text-sm text-red-600 font-medium">Overdue PMs</p>
        <p class="text-xs text-red-500 mt-0.5">${overduePct}% of total</p>
      </div>
      <div class="bg-yellow-50 border border-yellow-200 rounded-xl p-4 text-center">
        <p class="text-3xl font-bold text-yellow-700">${upcoming.length}</p>
        <p class="text-sm text-yellow-600 font-medium">Due in 30 Days</p>
      </div>
      <div class="bg-green-50 border border-green-200 rounded-xl p-4 text-center">
        <p class="text-3xl font-bold text-green-700">${compliant.length}</p>
        <p class="text-sm text-green-600 font-medium">On Schedule</p>
      </div>
    </div>
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-5 mb-5">
      <div class="bg-white rounded-xl border border-gray-200 p-5">
        <h3 class="font-semibold text-sm text-gray-900 mb-3">Plan vs Actual (6 Months)</h3>
        <canvas id="chartPMTrack" height="180"></canvas>
      </div>
      <div class="bg-white rounded-xl border border-gray-200 p-5">
        <h3 class="font-semibold text-sm text-gray-900 mb-3">PM by Technician</h3>
        <canvas id="chartPMTech" height="180"></canvas>
      </div>
    </div>
    <div class="bg-white rounded-xl border border-gray-200 overflow-hidden">
      <div class="p-4 border-b border-gray-100"><h3 class="font-semibold text-sm text-gray-900">Overdue PM List</h3></div>
      <table>
        <thead><tr><th>Equipment</th><th>Task</th><th>Type</th><th>Due Date</th><th>Days Overdue</th><th>Technician</th><th></th></tr></thead>
        <tbody>${overdue.length===0?`<tr><td colspan="7" class="text-center text-gray-400 py-6">No overdue PMs</td></tr>`:
          overdue.map(p=>`<tr>
            <td class="font-semibold text-sm">${eqName(p.equipmentId)}</td>
            <td class="text-sm">${p.task}</td>
            <td>${statusBadge(p.pmType||'PM')}</td>
            <td class="text-xs text-red-600">${p.nextDue}</td>
            <td class="text-sm font-bold text-red-700">${Math.abs(diffDays(p.nextDue))} days</td>
            <td class="text-sm">${techName(p.assignedTo)}</td>
            <td>${hasRole(['Admin','Maintenance'])?`<button onclick="pmComplete('${p.id}')" class="text-green-700 text-xs font-semibold hover:underline">✔ Done</button>`:''}</td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>`;

  setTimeout(()=>{
    const techNames=DB.technicians.map(t=>t.name);
    const techCounts=DB.technicians.map(t=>DB.pmSchedules.filter(p=>p.assignedTo===t.id).length);
    mkChart('chartPMTrack',{type:'bar',data:{labels:months6,datasets:[{label:'Planned',data:pmPlan,backgroundColor:'rgba(59,130,246,0.5)',borderColor:'#3b82f6',borderWidth:1},{label:'Actual',data:pmDone,backgroundColor:'rgba(16,163,74,0.5)',borderColor:'#10b981',borderWidth:1}]},options:{plugins:{legend:{position:'bottom'}},scales:{y:{beginAtZero:true,ticks:{stepSize:1}}}}});
    mkChart('chartPMTech',{type:'doughnut',data:{labels:techNames,datasets:[{data:techCounts,backgroundColor:['#3b82f6','#10b981','#f59e0b','#ef4444','#8b5cf6']}]},options:{plugins:{legend:{position:'bottom'}},cutout:'55%'}});
  },50);

RENDERERS.calibration=function(){
  document.getElementById('pageContent').innerHTML=`
    <div class="flex flex-wrap gap-3 items-center mb-4">
      <div class="flex gap-2">
        ${['All','Valid','Expiring Soon','Expired'].map(f=>`<button onclick="calFilter('${f}')" class="px-3 py-1.5 rounded-lg text-sm font-medium bg-gray-100 text-gray-600 hover:bg-gray-200">${f}</button>`).join('')}
      </div>
      ${hasRole(['Admin','Maintenance'])?`<button onclick="calForm()" class="ml-auto bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-semibold">+ New Calibration</button>`:''}
    </div>
    <div class="bg-white rounded-xl border border-gray-200 overflow-x-auto">
      <table id="calTable">
        <thead><tr><th>ID</th><th>Equipment</th><th>Parameter</th><th>Make</th><th>Model</th><th>Serial No.</th><th>Frequency</th><th>Last CAL</th><th>Next Due</th><th>Certificate</th><th>Agency</th><th>Status</th><th>Report</th><th></th></tr></thead>
        <tbody id="calBody">${calRows(DB.calibrations)}</tbody>
      </table>
    </div>`;
};
function calFilter(f){
  const rows=f==='All'?DB.calibrations:DB.calibrations.filter(c=>{
    const d=diffDays(c.nextDue);
    if(f==='Expired')return d<0;
    if(f==='Expiring Soon')return d>=0&&d<=30;
    if(f==='Valid')return d>30;
    return true;
  });
  document.getElementById('calBody').innerHTML=calRows(rows);
}
function calRows(rows){
  return rows.map(c=>{
    const d=diffDays(c.nextDue);
    const status=d<0?'Expired':d<=30?'Expiring Soon':'Valid';
    return`<tr>
      <td class="font-mono text-xs">${c.id}</td>
      <td class="font-semibold text-sm">${eqName(c.equipmentId)}</td>
      <td class="text-sm">${c.parameter}</td>
      <td class="text-sm">${c.make||'-'}</td>
      <td class="text-sm">${c.model||'-'}</td>
      <td class="font-mono text-xs">${c.serialNo||'-'}</td>
      <td class="text-xs">${c.frequency}</td>
      <td class="text-xs">${c.lastCalibrated}</td>
      <td class="text-xs">${c.nextDue}<div class="${d<0?'text-red-600':d<=30?'text-yellow-600':'text-gray-400'} text-xs">${d<0?Math.abs(d)+'d expired':d+'d left'}</div></td>
      <td class="font-mono text-xs">${c.certificate}</td>
      <td class="text-xs">${c.agency||'-'}</td>
      <td>${statusBadge(status)}</td>
      <td>${attachmentLink(c.reportAttachment,c.reportName)}</td>
      <td class="flex gap-1">${hasRole(['Admin','Maintenance'])?`<button onclick="calRenew('${c.id}')" class="text-green-700 text-xs font-semibold hover:underline">Renew</button><button onclick="calEdit('${c.id}')" class="text-blue-700 text-xs font-semibold hover:underline ml-2">Edit</button>`:''}</td>
    </tr>`;
  }).join('');
}
function calForm(id){
  const c=id?DB.calibrations.find(x=>x.id===id):null;
  const linkedEq=c?DB.equipment.find(e=>e.id===c.equipmentId):null;
  openModal(id?'Edit Calibration':'New Calibration Record',`
    <form onsubmit="calSave(event,'${id||''}')" class="space-y-3">
      <div><label class="text-xs uppercase text-gray-600">Equipment</label>
        <select name="equipmentId" id="calEqSel" onchange="prefillCalFromEq(this.value)" required class="w-full px-3 py-2 border rounded mt-1">${eqDropdown(c?.equipmentId)}</select>
      </div>
      <div class="grid grid-cols-3 gap-3">
        <div><label class="text-xs uppercase text-gray-600">Make</label><input name="make" id="calMake" value="${c?.make||linkedEq?.manufacturer||''}" class="w-full px-3 py-2 border rounded mt-1"/></div>
        <div><label class="text-xs uppercase text-gray-600">Model</label><input name="model" id="calModel" value="${c?.model||linkedEq?.model||''}" class="w-full px-3 py-2 border rounded mt-1"/></div>
        <div><label class="text-xs uppercase text-gray-600">Serial No.</label><input name="serialNo" id="calSerial" value="${c?.serialNo||linkedEq?.serial||''}" class="w-full px-3 py-2 border rounded mt-1"/></div>
      </div>
      <div><label class="text-xs uppercase text-gray-600">Parameter / Scope</label><input name="parameter" value="${c?.parameter||''}" required class="w-full px-3 py-2 border rounded mt-1"/></div>
      <div class="grid grid-cols-2 gap-3">
        <div><label class="text-xs uppercase text-gray-600">Frequency</label>
          <select name="frequency" class="w-full px-3 py-2 border rounded mt-1">${['Quarterly','Half-Yearly','Yearly','2-Yearly'].map(f=>`<option ${c?.frequency===f?'selected':''}>${f}</option>`).join('')}</select>
        </div>
        <div><label class="text-xs uppercase text-gray-600">Next Due Date</label><input type="date" name="nextDue" value="${c?.nextDue||daysFromNow(365)}" required class="w-full px-3 py-2 border rounded mt-1"/></div>
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div><label class="text-xs uppercase text-gray-600">Certificate No.</label><input name="certificate" value="${c?.certificate||''}" required class="w-full px-3 py-2 border rounded mt-1"/></div>
        <div><label class="text-xs uppercase text-gray-600">Calibration Agency</label><input name="agency" value="${c?.agency||''}" class="w-full px-3 py-2 border rounded mt-1"/></div>
      </div>
      <div><label class="text-xs uppercase text-gray-600">Cost (₹)</label><input type="number" name="cost" value="${c?.cost||0}" class="w-full px-3 py-2 border rounded mt-1"/></div>
      <div><label class="text-xs uppercase text-gray-600">Calibration Report / Certificate (max 2MB)</label>
        <input type="file" id="calFileInput" accept=".pdf,.jpg,.jpeg,.png" class="w-full px-3 py-2 border rounded mt-1 text-sm"/>
        ${c?.reportAttachment?`<div class="mt-1">${attachmentLink(c.reportAttachment,c.reportName)}</div>`:''}
      </div>
      <div class="flex justify-end gap-2 pt-2"><button type="button" onclick="closeModal()" class="px-4 py-2 border rounded text-sm">Cancel</button><button class="bg-blue-700 text-white px-4 py-2 rounded text-sm">Save</button></div>
    </form>`);
}
function prefillCalFromEq(eqId){
  const eq=DB.equipment.find(e=>e.id===eqId);
  if(eq){
    const m=document.getElementById('calMake');const mo=document.getElementById('calModel');const s=document.getElementById('calSerial');
    if(m&&!m.value)m.value=eq.manufacturer||'';
    if(mo&&!mo.value)mo.value=eq.model||'';
    if(s&&!s.value)s.value=eq.serial||'';
  }
}
function calEdit(id){ calForm(id); }
function calSave(ev,editId){
  ev.preventDefault();
  const f=Object.fromEntries(new FormData(ev.target).entries());
  f.cost=Number(f.cost);
  const fileInput=document.getElementById('calFileInput');
  function finish(attachment,reportName){
    if(editId){
      const existing=DB.calibrations.find(x=>x.id===editId);
      Object.assign(existing,{...f,reportAttachment:attachment||existing.reportAttachment,reportName:reportName||existing.reportName});
    } else {
      DB.calibrations.push({id:'CAL-'+String(DB.calibrations.length+1).padStart(3,'0'),...f,lastCalibrated:todayISO(),status:'Valid',reportAttachment:attachment,reportName});
    }
    save(); closeModal(); navigate('calibration'); refreshNotif();
  }
  if(fileInput&&fileInput.files[0]) readFileB64(fileInput,(d,n)=>finish(d,n));
  else finish(null,null);
}
function calRenew(id){
  const c=DB.calibrations.find(x=>x.id===id);
  openModal('Renew Calibration — '+eqName(c.equipmentId),`
    <form onsubmit="calRenewConfirm(event,'${id}')" class="space-y-3">
      <div><label class="text-xs uppercase text-gray-600">New Certificate No.</label><input name="certificate" value="${c.certificate}" required class="w-full px-3 py-2 border rounded mt-1"/></div>
      <div><label class="text-xs uppercase text-gray-600">Calibration Date</label><input type="date" name="calDate" value="${todayISO()}" class="w-full px-3 py-2 border rounded mt-1"/></div>
      <div><label class="text-xs uppercase text-gray-600">Next Due Date</label><input type="date" name="nextDue" value="${daysFromNow({Quarterly:90,'Half-Yearly':180,Yearly:365,'2-Yearly':730}[c.frequency]||365)}" required class="w-full px-3 py-2 border rounded mt-1"/></div>
      <div><label class="text-xs uppercase text-gray-600">Cost (₹)</label><input type="number" name="cost" value="${c.cost||5000}" class="w-full px-3 py-2 border rounded mt-1"/></div>
      <div><label class="text-xs uppercase text-gray-600">Report / Certificate (max 2MB)</label>
        <input type="file" id="calRenewFile" accept=".pdf,.jpg,.jpeg,.png" class="w-full px-3 py-2 border rounded mt-1 text-sm"/>
      </div>
      <div class="flex justify-end gap-2"><button type="button" onclick="closeModal()" class="px-4 py-2 border rounded text-sm">Cancel</button><button class="bg-green-600 text-white px-4 py-2 rounded text-sm">Renew</button></div>
    </form>`);
}
function calRenewConfirm(ev,id){
  ev.preventDefault();
  const f=Object.fromEntries(new FormData(ev.target).entries());
  const fileInput=document.getElementById('calRenewFile');
  function finish(attachment,reportName){
    const c=DB.calibrations.find(x=>x.id===id);
    c.lastCalibrated=f.calDate||todayISO();
    c.nextDue=f.nextDue;
    c.certificate=f.certificate;
    if(attachment){c.reportAttachment=attachment;c.reportName=reportName;}
    DB.history.push({id:'H-'+String(DB.history.length+1).padStart(3,'0'),equipmentId:c.equipmentId,date:f.calDate||todayISO(),type:'CAL',description:c.parameter+' calibration renewed',technician:c.agency||'External',partsUsed:'-',cost:Number(f.cost)||0});
    save(); closeModal(); navigate('calibration'); refreshNotif();
  }
  if(fileInput&&fileInput.files[0]) readFileB64(fileInput,(d,n)=>finish(d,n));
  else finish(null,null);
}

/* ---- CAL TRACKING ---- */

    <div class="grid grid-cols-3 gap-4 mb-5">

      <h3 class="font-semibold text-sm text-gray-900 mb-3">Monthly Calibration Trend (6 Months)</h3>
      <canvas id="chartCALTrend" height="130"></canvas>
    </div>
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-5">
      <div class="bg-white rounded-xl border border-gray-200 overflow-hidden">
        <div class="p-4 border-b border-gray-100 flex items-center gap-2"><span class="text-red-500 font-bold text-sm">●</span><h3 class="font-semibold text-sm text-gray-900">Expired</h3></div>
        <table><thead><tr><th>Equipment</th><th>Parameter</th><th>Expired</th><th></th></tr></thead>
        <tbody>${expired.length===0?`<tr><td colspan="4" class="text-center text-gray-400 py-4 text-sm">None expired</td></tr>`:
          expired.map(c=>`<tr>
            <td class="text-sm font-semibold">${eqName(c.equipmentId)}</td>
            <td class="text-sm">${c.parameter}</td>
            <td class="text-xs text-red-600">${Math.abs(diffDays(c.nextDue))}d ago</td>
            <td>${hasRole(['Admin','Maintenance'])?`<button onclick="calRenew('${c.id}')" class="text-green-700 text-xs font-semibold hover:underline">Renew</button>`:''}</td>
          </tr>`).join('')}</tbody>
        </table>

        <div class="p-4 border-b border-gray-100 flex items-center gap-2"><span class="text-yellow-500 font-bold text-sm">●</span><h3 class="font-semibold text-sm text-gray-900">Expiring Soon (≤30 days)</h3></div>
        <table><thead><tr><th>Equipment</th><th>Parameter</th><th>Due In</th><th></th></tr></thead>
        <tbody>${expiring.length===0?`<tr><td colspan="4" class="text-center text-gray-400 py-4 text-sm">None expiring soon</td></tr>`:
          expiring.map(c=>`<tr>
            <td class="text-sm font-semibold">${eqName(c.equipmentId)}</td>

/* ---- COMPLIANCE ---- */
RENDERERS.compliance=function(){
  const totalPM=DB.pmSchedules.length;
  const overduePM=DB.pmSchedules.filter(p=>diffDays(p.nextDue)<0).length;
  const pmCompPct=Math.round(((totalPM-overduePM)/Math.max(1,totalPM))*100);
  const totalCAL=DB.calibrations.length;
  const expiredCAL=DB.calibrations.filter(c=>diffDays(c.nextDue)<0).length;
  const calCompPct=Math.round(((totalCAL-expiredCAL)/Math.max(1,totalCAL))*100);
  const overduePct=Math.round(overduePM/Math.max(1,totalPM)*100);
  const audits=DB.audits;
  const avgScore=audits.length?Math.round(audits.reduce((s,a)=>s+a.score,0)/audits.length):0;
  const openNC=audits.reduce((s,a)=>s+(a.status==='Open'?a.nonConformances:0),0);

  document.getElementById('pageContent').innerHTML=`
    <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-5">
      <div class="bg-white rounded-xl border border-gray-200 p-4 text-center">
        <div class="text-3xl font-bold ${pmCompPct>=80?'text-green-700':pmCompPct>=60?'text-yellow-700':'text-red-700'}">${pmCompPct}%</div>
        <p class="text-sm text-gray-600 mt-1">PM Compliance</p>
        <p class="text-xs text-gray-400">${totalPM-overduePM} / ${totalPM} on schedule</p>
      </div>
      <div class="bg-white rounded-xl border border-gray-200 p-4 text-center">
        <div class="text-3xl font-bold ${calCompPct>=80?'text-green-700':calCompPct>=60?'text-yellow-700':'text-red-700'}">${calCompPct}%</div>
        <p class="text-sm text-gray-600 mt-1">CAL Compliance</p>
        <p class="text-xs text-gray-400">${totalCAL-expiredCAL} / ${totalCAL} valid</p>
      </div>
      <div class="bg-white rounded-xl border border-gray-200 p-4 text-center">
        <div class="text-3xl font-bold text-red-700">${overduePct}%</div>
        <p class="text-sm text-gray-600 mt-1">PM Overdue %</p>
        <p class="text-xs text-gray-400">${overduePM} of ${totalPM} tasks overdue</p>
      </div>
      <div class="bg-white rounded-xl border border-gray-200 p-4 text-center">
        <div class="text-3xl font-bold ${avgScore>=80?'text-green-700':avgScore>=60?'text-yellow-700':'text-red-700'}">${avgScore}</div>
        <p class="text-sm text-gray-600 mt-1">Avg Audit Score</p>
        <p class="text-xs text-gray-400">${openNC} open non-conformances</p>
      </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-5 mb-5">
      <div class="bg-white rounded-xl border border-gray-200 p-5">
        <h3 class="font-semibold text-sm text-gray-900 mb-4">Compliance Overview</h3>
        <canvas id="chartComp" height="200"></canvas>
      </div>
      <div class="bg-white rounded-xl border border-gray-200 p-5">
        <h3 class="font-semibold text-sm text-gray-900 mb-3">PM Compliance by Equipment</h3>
        <div class="space-y-3">
          ${DB.equipment.map(e=>{
            const eqPMs=DB.pmSchedules.filter(p=>p.equipmentId===e.id);
            const overPMs=eqPMs.filter(p=>diffDays(p.nextDue)<0).length;
            const pct=eqPMs.length?Math.round(((eqPMs.length-overPMs)/eqPMs.length)*100):100;
            return`<div>
              <div class="flex justify-between text-xs mb-1"><span class="font-medium text-gray-700">${e.name}</span><span class="font-bold ${pct>=80?'text-green-700':pct>=60?'text-yellow-700':'text-red-700'}">${pct}%</span></div>
              <div class="w-full bg-gray-200 rounded-full h-2"><div class="${pct>=80?'bg-green-500':pct>=60?'bg-yellow-500':'bg-red-500'} h-2 rounded-full progress-bar" style="width:${pct}%"></div></div>
            </div>`;
          }).join('')}

function brUpdate(ev,id){
  ev.preventDefault(); const f=Object.fromEntries(new FormData(ev.target).entries());
  const b=DB.breakdowns.find(x=>x.id===id); Object.assign(b,f); b.resolutionTime=f.resolutionTime?Number(f.resolutionTime):null;
  if(b.status==='Resolved') DB.history.push({id:'H-'+String(DB.history.length+1).padStart(3,'0'),equipmentId:b.equipmentId,date:todayISO(),type:'Breakdown',description:b.description,technician:techName(b.assignedTo),partsUsed:'-',cost:0});
  save(); closeModal(); navigate('breakdown'); refreshNotif();
}

RENDERERS.lifecycle=function(){
  document.getElementById('pageContent').innerHTML=`
    <p class="text-sm text-gray-600 mb-4">Track each asset from commissioning — usage hours, lifespan, and health</p>
    <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
      ${DB.equipment.map(e=>{
        const usageH=getUsageHours(e);
        const expectedH=e.expectedLifespanHours||0;
        const lifePct=expectedH?Math.min(100,Math.round(usageH/expectedH*100)):0;
        const remainH=Math.max(0,expectedH-usageH);
        const totalCost=DB.history.filter(h=>h.equipmentId===e.id).reduce((s,h)=>s+h.cost,0);
        const breakdownCount=DB.breakdowns.filter(b=>b.equipmentId===e.id).length;
        const warrantyDays=diffDays(e.warrantyEnd);
        const healthScore=Math.max(0,Math.min(100,100-breakdownCount*10-(warrantyDays<0?5:0)-(lifePct>80?15:lifePct>60?5:0)));
        const barColor=lifePct>=90?'bg-red-500':lifePct>=70?'bg-yellow-500':'bg-green-500';
        return`<div class="bg-white border rounded-xl p-5">
          <div class="flex justify-between items-start mb-3">
            <div><h4 class="font-bold text-gray-900 text-sm">${e.name}</h4><p class="text-xs text-gray-500">${e.id} · ${e.location}</p></div>

            <div class="flex justify-between"><span class="text-gray-500">Warranty</span><span class="font-medium ${warrantyDays<0?'text-red-600':''}">${warrantyDays<0?'Expired':warrantyDays+' days left'}</span></div>
          </div>
          <div class="bg-gray-50 rounded-lg p-3 mb-3 text-xs">
            <div class="flex justify-between mb-1"><span class="text-gray-600">Expected Lifespan</span><span class="font-semibold">${expectedH.toLocaleString()} h</span></div>
            <div class="flex justify-between mb-1"><span class="text-gray-600">Usage Hours</span><span class="font-semibold ${lifePct>=90?'text-red-700':lifePct>=70?'text-yellow-700':'text-green-700'}">${usageH.toLocaleString()} h (${lifePct}%)</span></div>
            <div class="flex justify-between"><span class="text-gray-600">Remaining</span><span class="font-semibold">${remainH.toLocaleString()} h</span></div>
            <div class="w-full bg-gray-200 rounded-full h-2 mt-2"><div class="${barColor} h-2 rounded-full progress-bar" style="width:${lifePct}%"></div></div>
          </div>
          <div>
            <div class="flex justify-between text-xs mb-1"><span class="text-gray-500">Health Score</span><span class="font-bold">${Math.round(healthScore)}/100</span></div>
            <div class="w-full bg-gray-200 rounded-full h-1.5"><div class="${healthScore>70?'bg-green-500':healthScore>40?'bg-yellow-500':'bg-red-500'} h-1.5 rounded-full progress-bar" style="width:${healthScore}%"></div></div>
          </div>
        </div>`;
      }).join('')}
    </div>`;
};

RENDERERS.schedule=function(){
  const today=new Date(); const start=new Date(today.getFullYear(),today.getMonth(),1);
  const dim=new Date(today.getFullYear(),today.getMonth()+1,0).getDate();
  const startDay=start.getDay();
  const monthStr=today.toLocaleString('default',{month:'long',year:'numeric'});
  const events={};
  DB.pmSchedules.forEach(p=>{
    if(p.nextDue&&p.nextDue.startsWith(today.toISOString().slice(0,7))){
      const d=Number(p.nextDue.slice(8)); events[d]=events[d]||[];
      events[d].push({type:'PM',label:eqName(p.equipmentId),color:'blue'});
    }
  });
  DB.calibrations.forEach(c=>{
    if(c.nextDue&&c.nextDue.startsWith(today.toISOString().slice(0,7))){
      const d=Number(c.nextDue.slice(8)); events[d]=events[d]||[];
      events[d].push({type:'CAL',label:eqName(c.equipmentId),color:'purple'});
    }
  });
  let cells='';
  for(let i=0;i<startDay;i++) cells+='<div class="border bg-gray-50 h-20"></div>';
  for(let d=1;d<=dim;d++){
    const ev=events[d]||[];
    cells+=`<div class="border h-20 p-1 overflow-hidden ${d===today.getDate()?'bg-blue-50 border-blue-300':''}">
      <div class="text-xs font-bold ${d===today.getDate()?'text-blue-700':''}">${d}</div>
      ${ev.slice(0,2).map(e=>`<div class="text-xs px-1 py-0.5 mt-0.5 rounded bg-${e.color}-100 text-${e.color}-800 truncate leading-tight">${e.type}: ${e.label}</div>`).join('')}
      ${ev.length>2?`<div class="text-xs text-gray-500">+${ev.length-2}</div>`:''}
    </div>`;
  }
  document.getElementById('pageContent').innerHTML=`
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-5">
      <div class="lg:col-span-2 bg-white border rounded-xl p-5">
        <h3 class="font-bold text-gray-900 mb-3">${monthStr}</h3>
        <div class="grid grid-cols-7 text-xs font-semibold text-gray-500 mb-1">${['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d=>`<div class="p-1">${d}</div>`).join('')}</div>
        <div class="grid grid-cols-7">${cells}</div>
        <div class="flex gap-4 mt-3 text-xs text-gray-500">
          <div class="flex items-center gap-1"><div class="w-3 h-3 bg-blue-200 rounded"></div> PM</div>
          <div class="flex items-center gap-1"><div class="w-3 h-3 bg-purple-200 rounded"></div> CAL</div>
        </div>
      </div>
      <div class="bg-white border rounded-xl p-5">
        <h3 class="font-bold text-gray-900 mb-3 text-sm">Technician Workload</h3>
        <div class="space-y-3">${DB.technicians.map(t=>{
          const c=DB.pmSchedules.filter(p=>p.assignedTo===t.id).length+DB.breakdowns.filter(b=>b.assignedTo===t.id&&b.status!=='Resolved').length;
          return`<div>
            <div class="flex justify-between text-sm mb-1"><span>${t.name}</span><span class="font-bold">${c} tasks</span></div>
            <div class="bg-gray-200 rounded-full h-2"><div class="bg-blue-600 h-2 rounded-full" style="width:${Math.min(100,c*15)}%"></div></div>
            <p class="text-xs text-gray-400">${t.dept}</p>
          </div>`;
        }).join('')}</div>
      </div>
    </div>`;
};

/* ---- AUDIT ---- */
RENDERERS.audit=function(){
  document.getElementById('pageContent').innerHTML=`
    <div class="flex justify-between items-center mb-4">
      <p class="text-sm text-gray-600">Audit checklists, scoring and CAPA tracking</p>
      ${hasRole(['Admin','HOD'])?`<button onclick="auForm()" class="bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-semibold">+ New Audit</button>`:''}
    </div>
    <div class="bg-white rounded-xl border border-gray-200 overflow-hidden">
      <table>
        <thead><tr><th>ID</th><th>Equipment</th><th>Date</th><th>Auditor</th><th>Score</th><th>Non-Conformances</th><th>CAPA</th><th>Status</th></tr></thead>
        <tbody>${DB.audits.map(a=>`<tr>
          <td class="font-mono text-xs">${a.id}</td>
          <td class="font-semibold text-sm">${eqName(a.equipmentId)}</td>
          <td class="text-xs">${a.date}</td>
          <td class="text-sm">${a.auditor}</td>
          <td><span class="font-bold text-sm ${a.score>=80?'text-green-700':a.score>=60?'text-yellow-700':'text-red-700'}">${a.score}/100</span></td>
          <td class="text-sm">${a.nonConformances}</td>
          <td class="text-xs max-w-xs truncate">${a.capa}</td>
          <td>${statusBadge(a.status)}</td>
        </tr>`).join('')}</tbody>
      </table>
    </div>`;
};
function auForm(){
  openModal('New Audit',`
    <form onsubmit="auSave(event)" class="space-y-3">
      <div><label class="text-xs uppercase text-gray-600">Equipment</label><select name="equipmentId" required class="w-full px-3 py-2 border rounded mt-1">${eqDropdown()}</select></div>
      <div class="grid grid-cols-2 gap-3">
        <div><label class="text-xs uppercase text-gray-600">Score (0–100)</label><input type="number" name="score" min="0" max="100" required class="w-full px-3 py-2 border rounded mt-1"/></div>
        <div><label class="text-xs uppercase text-gray-600">Non-Conformances</label><input type="number" name="nonConformances" value="0" required class="w-full px-3 py-2 border rounded mt-1"/></div>
      </div>
      <div><label class="text-xs uppercase text-gray-600">CAPA / Corrective Action</label><textarea name="capa" rows="2" class="w-full px-3 py-2 border rounded mt-1"></textarea></div>
      <div><label class="text-xs uppercase text-gray-600">Status</label><select name="status" class="w-full px-3 py-2 border rounded mt-1"><option>Open</option><option>Closed</option></select></div>
      <div class="flex justify-end gap-2"><button type="button" onclick="closeModal()" class="px-4 py-2 border rounded text-sm">Cancel</button><button class="bg-blue-700 text-white px-4 py-2 rounded text-sm">Save</button></div>
    </form>`);
}
function auSave(ev){
  ev.preventDefault(); const f=Object.fromEntries(new FormData(ev.target).entries());
  DB.audits.push({id:'AU-'+String(DB.audits.length+1).padStart(3,'0'),...f,date:todayISO(),auditor:currentUser().name,score:Number(f.score),nonConformances:Number(f.nonConformances)});
  save(); closeModal(); navigate('audit');
}

/* ---- USERS ---- */
RENDERERS.users=function(){
  document.getElementById('pageContent').innerHTML=`
    <div class="flex justify-between items-center mb-4">
      <p class="text-sm text-gray-600">Manage system users and roles</p>
      <button onclick="usForm()" class="bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-semibold">+ Add User</button>
    </div>
    <div class="bg-white rounded-xl border border-gray-200 overflow-hidden mb-5">
      <table>
        <thead><tr><th>Username</th><th>Name</th><th>Email</th><th>Role</th><th></th></tr></thead>
        <tbody>${DB.users.map(u=>`<tr>
          <td class="font-mono text-xs">${u.username}</td>
          <td class="font-semibold text-sm">${u.name}</td>
          <td class="text-sm">${u.email}</td>
          <td><span class="badge b-blue">${u.role}</span></td>
          <td>${u.id!==SESSION.userId?`<button onclick="usDel('${u.id}')" class="text-red-600 text-xs font-semibold hover:underline">Delete</button>`:''}</td>
        </tr>`).join('')}</tbody>
      </table>
    </div>
    <div class="flex justify-between items-center mb-3">
      <h3 class="font-semibold text-gray-900 text-sm">Technicians</h3>
      <button onclick="addTechnicianModal('__none__')" class="bg-green-600 text-white px-3 py-1.5 rounded-lg text-sm font-semibold">+ Add Technician</button>
    </div>
    <div class="bg-white rounded-xl border border-gray-200 overflow-hidden">
      <table>
        <thead><tr><th>ID</th><th>Name</th><th>Phone</th><th>Department</th><th></th></tr></thead>
        <tbody>${DB.technicians.map(t=>`<tr>
          <td class="font-mono text-xs">${t.id}</td>
          <td class="font-semibold text-sm">${t.name}</td>
          <td class="text-sm">${t.phone||'-'}</td>
          <td class="text-sm">${t.dept||'-'}</td>
          <td><button onclick="techDel('${t.id}')" class="text-red-600 text-xs font-semibold hover:underline">Delete</button></td>
        </tr>`).join('')}</tbody>
      </table>
    </div>`;
};
function usForm(){
  openModal('Add User',`
    <form onsubmit="usSave(event)" class="space-y-3">
      <div class="grid grid-cols-2 gap-3">
        <div><label class="text-xs uppercase text-gray-600">Username</label><input name="username" required class="w-full px-3 py-2 border rounded mt-1"/></div>
        <div><label class="text-xs uppercase text-gray-600">Password</label><input name="password" required class="w-full px-3 py-2 border rounded mt-1"/></div>
        <div><label class="text-xs uppercase text-gray-600">Full Name</label><input name="name" required class="w-full px-3 py-2 border rounded mt-1"/></div>
        <div><label class="text-xs uppercase text-gray-600">Email</label><input name="email" type="email" required class="w-full px-3 py-2 border rounded mt-1"/></div>
      </div>
      <div><label class="text-xs uppercase text-gray-600">Role</label><select name="role" class="w-full px-3 py-2 border rounded mt-1">${['Admin','Maintenance','Viewer','HOD'].map(r=>`<option>${r}</option>`).join('')}</select></div>
      <div class="flex justify-end gap-2"><button type="button" onclick="closeModal()" class="px-4 py-2 border rounded text-sm">Cancel</button><button class="bg-blue-700 text-white px-4 py-2 rounded text-sm">Save</button></div>
    </form>`);
}
function usSave(ev){
  ev.preventDefault(); const f=Object.fromEntries(new FormData(ev.target).entries());
  DB.users.push({id:'u'+(DB.users.length+1),...f});
  save(); closeModal(); navigate('users');
}
function usDel(id){ if(!confirm('Delete user?'))return; DB.users=DB.users.filter(u=>u.id!==id); save(); navigate('users'); }
function techDel(id){ if(!confirm('Delete technician?'))return; DB.technicians=DB.technicians.filter(t=>t.id!==id); save(); navigate('users'); }

/* ================= INIT ================= */
function initApp(){
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('appScreen').classList.remove('hidden');
  const u=currentUser();
  document.getElementById('userName').textContent=u.name;
  document.getElementById('userRole').textContent=u.role;
  document.getElementById('userAvatar').textContent=u.name.split(' ').map(n=>n[0]).join('').slice(0,2);
  buildSidebar();
  navigate('dashboard');
  refreshNotif();
  // Update running hours every minute
  setInterval(()=>{ if(currentPage==='overview'||currentPage==='lifecycle'||currentPage==='reports') navigate(currentPage); },60000);
}
if(SESSION) initApp();
</script>
</body>
</html>
