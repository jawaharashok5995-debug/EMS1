<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>EMMS — Equipment Maintenance Management</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #080c14;
  --surface: #0d1421;
  --surface2: #111827;
  --surface3: #1a2235;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --accent: #3b82f6;
  --accent2: #6366f1;
  --accent3: #8b5cf6;
  --green: #10b981;
  --yellow: #f59e0b;
  --red: #ef4444;
  --orange: #f97316;
  --cyan: #06b6d4;
  --text: #f1f5f9;
  --text2: #94a3b8;
  --text3: #475569;
  --glow: rgba(59,130,246,0.15);
  --glow2: rgba(99,102,241,0.12);
  --sidebar-w: 260px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;background:var(--bg);}
body{font-family:'DM Sans',sans-serif;color:var(--text);display:flex;}

/* SCROLLBAR */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:10px}

/* ---- 3D GRID BACKGROUND ---- */
#bg-canvas{position:fixed;inset:0;pointer-events:none;z-index:0;opacity:0.4;}

/* ---- LOGIN ---- */
#loginScreen{
  position:fixed;inset:0;z-index:1000;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(ellipse at 60% 40%, rgba(59,130,246,0.15) 0%, transparent 60%),
             radial-gradient(ellipse at 20% 80%, rgba(139,92,246,0.1) 0%, transparent 50%),
             var(--bg);
}
.login-card{
  width:420px;background:var(--surface);border:1px solid var(--border2);border-radius:24px;padding:48px 40px;
  box-shadow:0 0 80px rgba(59,130,246,0.12), 0 40px 80px rgba(0,0,0,0.5);
  animation:loginIn 0.6s cubic-bezier(0.34,1.56,0.64,1);position:relative;overflow:hidden;
}
.login-card::before{
  content:'';position:absolute;top:-60px;right:-60px;width:200px;height:200px;
  background:radial-gradient(circle, rgba(99,102,241,0.15), transparent 70%);
  border-radius:50%;
}
@keyframes loginIn{from{opacity:0;transform:translateY(30px) scale(0.95)}to{opacity:1;transform:translateY(0) scale(1)}}
.login-logo{
  width:56px;height:56px;border-radius:16px;
  background:linear-gradient(135deg, var(--accent), var(--accent3));
  display:flex;align-items:center;justify-content:center;
  font-size:24px;margin:0 auto 24px;
  box-shadow:0 8px 24px rgba(59,130,246,0.3);
}
.login-card h1{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;text-align:center;margin-bottom:4px;}
.login-card p{color:var(--text2);font-size:13px;text-align:center;margin-bottom:32px;}
.field label{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0.08em;display:block;margin-bottom:6px;}
.field input{
  width:100%;background:var(--surface3);border:1px solid var(--border);border-radius:10px;
  padding:11px 14px;font-size:14px;color:var(--text);font-family:'DM Sans',sans-serif;
  transition:border-color 0.2s,box-shadow 0.2s;outline:none;
}
.field input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(59,130,246,0.15);}
.field{margin-bottom:16px;}
.btn-primary{
  width:100%;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;
  color:#fff;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;
  padding:13px;border-radius:10px;cursor:pointer;margin-top:8px;
  transition:opacity 0.2s,transform 0.15s,box-shadow 0.2s;
  box-shadow:0 4px 20px rgba(59,130,246,0.3);letter-spacing:0.02em;
}
.btn-primary:hover{opacity:0.9;transform:translateY(-1px);box-shadow:0 8px 28px rgba(59,130,246,0.4);}
.btn-primary:active{transform:translateY(0);}
.demo-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:20px;}
.demo-btn{
  background:var(--surface3);border:1px solid var(--border);border-radius:8px;
  padding:8px 10px;cursor:pointer;color:var(--text2);font-size:12px;transition:all 0.15s;text-align:left;
}
.demo-btn:hover{border-color:var(--border2);color:var(--text);background:var(--surface2);}
.demo-btn b{display:block;color:var(--text);font-weight:600;font-size:11px;margin-bottom:2px;}
.login-err{color:var(--red);font-size:12px;text-align:center;margin-top:10px;display:none;}
.divider{border:none;border-top:1px solid var(--border);margin:24px 0 16px;}

/* ---- APP SHELL ---- */
#appScreen{display:none;width:100%;height:100vh;position:relative;z-index:1;}
.app-layout{display:flex;height:100vh;width:100%;}

/* ---- SIDEBAR ---- */
.sidebar{
  width:var(--sidebar-w);flex-shrink:0;
  background:linear-gradient(180deg, var(--surface) 0%, var(--surface2) 100%);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;position:relative;z-index:10;
  transition:transform 0.3s cubic-bezier(0.4,0,0.2,1);
}
.sidebar::after{
  content:'';position:absolute;top:0;right:0;bottom:0;width:1px;
  background:linear-gradient(180deg, transparent, rgba(59,130,246,0.3) 50%, transparent);
}
.sb-header{padding:20px;border-bottom:1px solid var(--border);}
.sb-logo{
  display:flex;align-items:center;gap:12px;
}
.sb-logo-icon{
  width:38px;height:38px;border-radius:10px;
  background:linear-gradient(135deg,var(--accent),var(--accent3));
  display:flex;align-items:center;justify-content:center;font-size:18px;
  box-shadow:0 4px 12px rgba(59,130,246,0.3);flex-shrink:0;
}
.sb-logo-text{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;color:var(--text);}
.sb-logo-sub{font-size:10px;color:var(--text3);font-weight:500;letter-spacing:0.05em;}
.sb-nav{flex:1;overflow-y:auto;padding:10px;}
.sb-section{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:0.1em;text-transform:uppercase;padding:12px 8px 4px;}
.nav-btn{
  width:100%;display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:10px;
  border:none;background:none;cursor:pointer;color:var(--text2);font-size:13px;
  font-family:'DM Sans',sans-serif;font-weight:500;transition:all 0.15s;text-align:left;
  position:relative;
}
.nav-btn .nav-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;background:transparent;transition:all 0.15s;}
.nav-btn:hover{color:var(--text);background:var(--surface3);}
.nav-btn:hover .nav-icon{background:rgba(59,130,246,0.1);}
.nav-btn.active{color:var(--accent);background:rgba(59,130,246,0.08);}
.nav-btn.active .nav-icon{background:rgba(59,130,246,0.15);}
.nav-btn.active::before{content:'';position:absolute;left:0;top:20%;bottom:20%;width:3px;background:var(--accent);border-radius:0 3px 3px 0;}
.nav-badge{margin-left:auto;background:var(--red);color:#fff;font-size:10px;font-weight:700;min-width:18px;height:18px;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 4px;}
.sb-user{padding:12px;border-top:1px solid var(--border);}
.sb-user-inner{display:flex;align-items:center;gap:10px;padding:8px;border-radius:10px;background:var(--surface3);}
.avatar{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0;}
.sb-user-name{font-size:13px;font-weight:600;color:var(--text);}
.sb-user-role{font-size:11px;color:var(--text3);}
.signout-btn{width:100%;background:none;border:none;color:var(--text3);font-size:12px;padding:8px;cursor:pointer;transition:color 0.15s;text-align:center;font-family:'DM Sans',sans-serif;}
.signout-btn:hover{color:var(--red);}

/* ---- MAIN AREA ---- */
.main-area{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.topbar{
  height:60px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;
  padding:0 24px;border-bottom:1px solid var(--border);
  background:rgba(13,20,33,0.8);backdrop-filter:blur(20px);
  position:relative;z-index:5;
}
.topbar-left h2{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;color:var(--text);}
.topbar-left p{font-size:11px;color:var(--text3);margin-top:1px;}
.topbar-right{display:flex;align-items:center;gap:8px;}
.icon-btn{
  width:36px;height:36px;border-radius:10px;background:var(--surface3);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  transition:all 0.15s;color:var(--text2);position:relative;
}
.icon-btn:hover{border-color:var(--border2);color:var(--text);}
.notif-dot{position:absolute;top:6px;right:6px;width:7px;height:7px;background:var(--red);border-radius:50%;border:1.5px solid var(--surface3);}
.export-btn{
  display:flex;align-items:center;gap:6px;padding:0 14px;height:36px;border-radius:10px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;
  color:#fff;font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;
  box-shadow:0 2px 12px rgba(59,130,246,0.25);transition:all 0.15s;
}
.export-btn:hover{opacity:0.9;transform:translateY(-1px);}
#pageContent{flex:1;overflow-y:auto;padding:20px 24px;}

/* ---- KPI CARDS ---- */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:14px;margin-bottom:20px;}
.kpi-card{
  background:var(--surface);border:1px solid var(--border);border-radius:16px;
  padding:18px;cursor:pointer;transition:all 0.25s cubic-bezier(0.34,1.56,0.64,1);
  position:relative;overflow:hidden;
}
.kpi-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--kpi-color,rgba(59,130,246,0.05)),transparent);pointer-events:none;}
.kpi-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--kpi-color, var(--accent)),transparent);opacity:0;transition:opacity 0.25s;}
.kpi-card:hover{transform:translateY(-4px) scale(1.02);border-color:var(--border2);box-shadow:0 12px 40px rgba(0,0,0,0.3),0 0 0 1px rgba(255,255,255,0.05);}
.kpi-card:hover::after{opacity:1;}
.kpi-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;}
.kpi-label{font-size:11px;font-weight:600;color:var(--text2);line-height:1.4;}
.kpi-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;background:rgba(255,255,255,0.04);}
.kpi-value{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;line-height:1;color:var(--text);}
.kpi-sub{font-size:10px;color:var(--text3);margin-top:6px;}

/* ---- CHARTS SECTION ---- */
.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px;}
.chart-card{
  background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px;
  position:relative;overflow:hidden;
}
.chart-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(59,130,246,0.3),transparent);}
.chart-title{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--text);margin-bottom:16px;}
.chart-subtitle{font-size:11px;color:var(--text3);font-weight:400;display:block;margin-top:2px;}

/* ---- TABLE ---- */
.table-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:16px;}
.table-header{padding:16px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);}
.table-header-title{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--text);}
.tbl{width:100%;border-collapse:collapse;}
.tbl th{padding:10px 16px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--text3);text-align:left;background:rgba(255,255,255,0.02);border-bottom:1px solid var(--border);}
.tbl td{padding:12px 16px;font-size:13px;border-bottom:1px solid rgba(255,255,255,0.03);vertical-align:middle;}
.tbl tr:last-child td{border-bottom:none;}
.tbl tr:hover td{background:rgba(255,255,255,0.02);}

/* ---- BADGE ---- */
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;}
.b-green{background:rgba(16,185,129,0.15);color:#34d399;}
.b-red{background:rgba(239,68,68,0.15);color:#f87171;}
.b-yellow{background:rgba(245,158,11,0.15);color:#fbbf24;}
.b-blue{background:rgba(59,130,246,0.15);color:#60a5fa;}
.b-gray{background:rgba(100,116,139,0.15);color:#94a3b8;}
.b-purple{background:rgba(139,92,246,0.15);color:#a78bfa;}
.b-orange{background:rgba(249,115,22,0.15);color:#fb923c;}
.b-indigo{background:rgba(99,102,241,0.15);color:#818cf8;}
.b-cyan{background:rgba(6,182,212,0.15);color:#22d3ee;}

/* ---- ACTION BUTTONS ---- */
.btn-sm{padding:5px 12px;border-radius:7px;font-size:11px;font-weight:600;border:none;cursor:pointer;transition:all 0.15s;font-family:'DM Sans',sans-serif;}
.btn-sm.primary{background:rgba(59,130,246,0.15);color:var(--accent);border:1px solid rgba(59,130,246,0.2);}
.btn-sm.primary:hover{background:var(--accent);color:#fff;}
.btn-sm.danger{background:rgba(239,68,68,0.1);color:var(--red);border:1px solid rgba(239,68,68,0.2);}
.btn-sm.danger:hover{background:var(--red);color:#fff;}
.btn-sm.success{background:rgba(16,185,129,0.1);color:var(--green);border:1px solid rgba(16,185,129,0.2);}
.btn-sm.success:hover{background:var(--green);color:#fff;}

/* ---- ADD BUTTON ---- */
.add-btn{
  display:flex;align-items:center;gap:6px;padding:7px 16px;border-radius:10px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;
  color:#fff;font-size:12px;font-weight:600;cursor:pointer;
  box-shadow:0 2px 10px rgba(59,130,246,0.25);transition:all 0.15s;font-family:'DM Sans',sans-serif;
}
.add-btn:hover{opacity:0.9;transform:translateY(-1px);}

/* ---- PAGE SECTIONS ---- */
.page-toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.page-toolbar-title{font-size:13px;color:var(--text2);}

/* ---- PROGRESS ---- */
.progress-track{height:6px;background:rgba(255,255,255,0.06);border-radius:10px;overflow:hidden;margin-top:4px;}
.progress-fill{height:100%;border-radius:10px;transition:width 0.6s ease;}
.p-green{background:linear-gradient(90deg,var(--green),#34d399);}
.p-yellow{background:linear-gradient(90deg,var(--yellow),#fcd34d);}
.p-red{background:linear-gradient(90deg,var(--red),#f87171);}

/* ---- MODAL ---- */
#modal{position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(8px);z-index:500;display:none;align-items:center;justify-content:center;padding:20px;}
#modal.show{display:flex;}
.modal-box{
  background:var(--surface);border:1px solid var(--border2);border-radius:20px;
  width:100%;max-width:640px;max-height:90vh;overflow-y:auto;
  box-shadow:0 40px 80px rgba(0,0,0,0.6);animation:modalIn 0.25s cubic-bezier(0.34,1.3,0.64,1);
}
@keyframes modalIn{from{opacity:0;transform:scale(0.95) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}
.modal-hdr{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--surface);z-index:1;border-radius:20px 20px 0 0;}
.modal-hdr h3{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;}
.modal-close{width:32px;height:32px;border-radius:8px;background:var(--surface3);border:none;cursor:pointer;color:var(--text2);font-size:18px;display:flex;align-items:center;justify-content:center;transition:all 0.15s;}
.modal-close:hover{background:rgba(239,68,68,0.15);color:var(--red);}
.modal-body{padding:24px;}

/* ---- FORM STYLES ---- */
.f-label{display:block;font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:5px;}
.f-input{width:100%;background:var(--surface3);border:1px solid var(--border);border-radius:8px;padding:9px 12px;font-size:13px;color:var(--text);font-family:'DM Sans',sans-serif;outline:none;transition:border-color 0.2s,box-shadow 0.2s;}
.f-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(59,130,246,0.1);}
.f-group{margin-bottom:14px;}
.f-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.f-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:20px;padding-top:16px;border-top:1px solid var(--border);}
.btn-cancel{padding:8px 18px;border-radius:8px;background:var(--surface3);border:1px solid var(--border);color:var(--text2);font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.15s;}
.btn-cancel:hover{color:var(--text);}
.btn-save{padding:8px 20px;border-radius:8px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;color:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;box-shadow:0 2px 10px rgba(59,130,246,0.25);transition:all 0.15s;}
.btn-save:hover{opacity:0.9;}

/* ---- NOTIFICATION PANEL ---- */
#notifPanel{
  position:fixed;top:60px;right:12px;width:360px;max-height:75vh;overflow-y:auto;
  background:var(--surface);border:1px solid var(--border2);border-radius:16px;
  box-shadow:0 20px 60px rgba(0,0,0,0.5);z-index:200;display:none;
}
#notifPanel.show{display:block;animation:slideDown 0.2s ease;}
@keyframes slideDown{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
.notif-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.notif-header h4{font-size:13px;font-weight:700;font-family:'Syne',sans-serif;}
.notif-item{padding:12px 16px;border-bottom:1px solid rgba(255,255,255,0.03);display:flex;gap:10px;cursor:pointer;transition:background 0.1s;}
.notif-item:hover{background:rgba(255,255,255,0.02);}
.notif-dot2{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px;}
.notif-text{font-size:12px;color:var(--text2);line-height:1.5;}
.notif-filters{display:flex;gap:6px;padding:10px 16px;border-bottom:1px solid var(--border);}
.nf-btn{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;border:none;cursor:pointer;background:var(--surface3);color:var(--text3);transition:all 0.15s;font-family:'DM Sans',sans-serif;}
.nf-btn.active{background:var(--accent);color:#fff;}

/* ---- STAT ROW ---- */
.stat-row{display:flex;gap:16px;margin-bottom:20px;}
.stat-item{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;text-align:center;}
.stat-item .val{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;}
.stat-item .lbl{font-size:11px;color:var(--text3);margin-top:4px;}

/* ---- EMPTY STATE ---- */
.empty{padding:40px;text-align:center;color:var(--text3);}
.empty p{font-size:13px;margin-top:8px;}

/* ---- LIFECYCLE CARD ---- */
.lc-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:12px;}
.lc-name{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;margin-bottom:4px;}
.lc-meta{font-size:11px;color:var(--text3);margin-bottom:12px;}

/* ---- PRINT ---- */
@media print{
  #loginScreen,#notifPanel,#modal,.sidebar,.topbar .topbar-right{display:none!important;}
  body,html{overflow:visible;height:auto;}
  #appScreen,#pageContent{overflow:visible;height:auto;}
  .kpi-card,.chart-card,.table-card,.lc-card{background:white!important;color:black!important;border:1px solid #ccc!important;}
}

/* ---- MOBILE ---- */
@media(max-width:768px){
  .sidebar{position:fixed;left:0;top:0;bottom:0;z-index:100;transform:translateX(-100%);}
  .sidebar.open{transform:translateX(0);}
  .chart-grid{grid-template-columns:1fr;}
  .kpi-grid{grid-template-columns:repeat(2,1fr);}
  #pageContent{padding:12px;}
  .f-row{grid-template-columns:1fr;}
  .mobile-menu-btn{display:flex!important;}
}
.mobile-menu-btn{display:none;width:36px;height:36px;border-radius:10px;background:var(--surface3);border:1px solid var(--border);align-items:center;justify-content:center;cursor:pointer;color:var(--text2);}

/* ============================================================
   3D ANIMATED BACKGROUND
============================================================ */
(function(){
  const canvas=document.getElementById('bg-canvas');
  const ctx=canvas.getContext('2d');
  let W,H,dots=[];
  function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;dots=[];for(let i=0;i<80;i++)dots.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.5+0.3,vx:(Math.random()-0.5)*0.3,vy:(Math.random()-0.5)*0.3,o:Math.random()*0.5+0.2});}
  resize();window.addEventListener('resize',resize);
  function draw(){
    ctx.clearRect(0,0,W,H);
    // Grid lines
    ctx.strokeStyle='rgba(59,130,246,0.04)';ctx.lineWidth=1;
    const gs=60;
    for(let x=0;x<W;x+=gs){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
    for(let y=0;y<H;y+=gs){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
    // Dots
    dots.forEach(d=>{
      d.x+=d.vx;d.y+=d.vy;
      if(d.x<0||d.x>W)d.vx*=-1;
      if(d.y<0||d.y>H)d.vy*=-1;
      ctx.beginPath();ctx.arc(d.x,d.y,d.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(99,102,241,${d.o})`;ctx.fill();
    });
    // Connections
    for(let i=0;i<dots.length;i++){
      for(let j=i+1;j<dots.length;j++){
        const dx=dots[i].x-dots[j].x,dy=dots[i].y-dots[j].y;
        const dist=Math.sqrt(dx*dx+dy*dy);
        if(dist<120){ctx.strokeStyle=`rgba(99,102,241,${0.06*(1-dist/120)})`;ctx.lineWidth=0.5;ctx.beginPath();ctx.moveTo(dots[i].x,dots[i].y);ctx.lineTo(dots[j].x,dots[j].y);ctx.stroke();}
      }
    }
    requestAnimationFrame(draw);
  }
  draw();
})();

/* ============================================================
   INDEXEDDB STORAGE (HIGH CAPACITY)
============================================================ */
const DB_NAME='EMMS_DB',DB_VER=1,STORE='data';
let idb=null;

function openIDB(){
  return new Promise((res,rej)=>{
    const req=indexedDB.open(DB_NAME,DB_VER);
    req.onupgradeneeded=e=>{const db=e.target.result;if(!db.objectStoreNames.contains(STORE))db.createObjectStore(STORE);};
    req.onsuccess=e=>{idb=e.target.result;res(idb);};
    req.onerror=e=>rej(e);
  });
}
function idbGet(key){
  return new Promise((res,rej)=>{
    const tx=idb.transaction(STORE,'readonly');
    const req=tx.objectStore(STORE).get(key);
    req.onsuccess=e=>res(e.target.result);
    req.onerror=e=>rej(e);
  });
}
function idbSet(key,val){
  return new Promise((res,rej)=>{
    const tx=idb.transaction(STORE,'readwrite');
    const req=tx.objectStore(STORE).put(val,key);
    req.onsuccess=()=>res();
    req.onerror=e=>rej(e);
  });
}

}

function buildSidebar(){
  const nav=document.getElementById('sideNav');
  const role=currentUser().role;
  const visible=MENU.filter(m=>m.roles.includes(role));
  const sections=[...new Set(visible.map(m=>m.section))];
  nav.innerHTML=sections.map(sec=>`
    <div class="sb-section">${sec}</div>
    ${visible.filter(m=>m.section===sec).map(m=>`
      <button onclick="navigate('${m.id}')" class="nav-btn ${currentPage===m.id?'active':''}">
        <span class="nav-icon">${m.icon}</span>
        <span style="flex:1">${m.label}</span>
      </button>`).join('')}`).join('');
}

function navigate(id){
  destroyCharts();currentPage=id;buildSidebar();
  const pi=PAGE_INFO[id]||{title:id,sub:''};
  document.getElementById('pageTitle').textContent=pi.title;
  document.getElementById('pageSubtitle').textContent=pi.sub;
  document.getElementById('pageContent').innerHTML='';
  if(RENDERERS[id])RENDERERS[id]();
  // close mobile menu
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('mobileOverlay').classList.remove('show');
}

   NOTIFICATIONS
============================================================ */
let allNotifs=[];
function buildNotifications(){
  const n=[];
  DB.pmSchedules.forEach(p=>{const d=diffDays(p.nextDue);if(d<0)n.push({type:'pm',color:'red',text:`PM Overdue: ${eqName(p.equipmentId)} — ${p.task} (${Math.abs(d)}d ago)`});else if(d<=7)n.push({type:'pm',color:'yellow',text:`PM Due Soon: ${eqName(p.equipmentId)} — ${p.task} (in ${d}d)`});});
  DB.calibrations.forEach(c=>{const d=diffDays(c.nextDue);if(d<0)n.push({type:'cal',color:'red',text:`CAL Expired: ${eqName(c.equipmentId)} — ${c.parameter} (${Math.abs(d)}d ago)`});else if(d<=14)n.push({type:'cal',color:'yellow',text:`CAL Expiring: ${eqName(c.equipmentId)} — ${c.parameter} (in ${d}d)`});});
  DB.spares.forEach(s=>{if(s.stock<=s.minStock)n.push({type:'other',color:'yellow',text:`Low Stock: ${s.name} — ${s.stock} ${s.unit} remaining`});});
  allNotifs=n;return n;
}
function toggleNotif(){
  const p=document.getElementById('notifPanel');
  p.classList.toggle('show');
  if(p.classList.contains('show')){buildNotifications();renderNotifList();}
}
function filterNotif(f){
  notifFilter=f;
  ['all','pm','cal','other'].forEach(x=>{document.getElementById('nf'+x.charAt(0).toUpperCase()+x.slice(1))?.classList.toggle('active',x===f);});
  renderNotifList();
}
function renderNotifList(){
  buildNotifications();
  const filtered=allNotifs.filter(n=>notifFilter==='all'||n.type===notifFilter);
  const dot=document.getElementById('notifDot');
  dot.style.display=allNotifs.length?'block':'none';
  document.getElementById('notifList').innerHTML=filtered.length===0
    ?'<div class="empty"><p>No alerts in this category</p></div>'
    :filtered.map(n=>`<div class="notif-item"><div class="notif-dot2" style="background:${n.color==='red'?'var(--red)':'var(--yellow)'}"></div><div class="notif-text">${n.text}</div></div>`).join('');
}

function eqName(id){return DB.equipment.find(e=>e.id===id)?.name||id;}
function techName(id){return DB.technicians.find(t=>t.id===id)?.name||id||'-';}
function statusBadge(s){
  const m={'Running':'b-green','Operational':'b-green','Under Maintenance':'b-yellow','Idle':'b-gray','Obsolete':'b-orange','Decommissioned':'b-gray','Scheduled':'b-blue','Overdue':'b-red','Completed':'b-green','Valid':'b-green','Expiring Soon':'b-yellow','Expired':'b-red','Open':'b-yellow','In Progress':'b-blue','Resolved':'b-green','Closed':'b-green','Active':'b-green','High':'b-red','Medium':'b-yellow','Low':'b-blue','PM':'b-blue','AM':'b-purple','CAL':'b-indigo','Breakdown':'b-red'};
  return `<span class="badge ${m[s]||'b-gray'}">${s}</span>`;
}
function eqDropdown(sel=''){return DB.equipment.map(e=>`<option value="${e.id}"${e.id===sel?' selected':''}>${e.name} (${e.id})</option>`).join('');}
function techDropdown(sel=''){return DB.technicians.map(t=>`<option value="${t.id}"${t.id===sel?' selected':''}>${t.name} — ${t.dept}</option>`).join('')+`<option value="__add__">+ Add New Technician</option>`;}
function handleTechChange(el){if(el.value==='__add__'){el.value='';addTechModal(el.id);}}
function destroyCharts(){Object.values(activeCharts).forEach(c=>{try{c.destroy();}catch(e){}});activeCharts={};}
function mkChart(id,cfg){
  const el=document.getElementById(id);if(!el)return;
  if(activeCharts[id])try{activeCharts[id].destroy();}catch(e){}
  Chart.defaults.color='#475569';
  Chart.defaults.borderColor='rgba(255,255,255,0.06)';
  activeCharts[id]=new Chart(el,cfg);
}

async function saveTechModal(returnId){
  const n=document.getElementById('tName').value.trim();

        <div class="progress-track"><div class="progress-fill p-green" style="width:${Math.round(DB.pmSchedules.filter(p=>diffDays(p.nextDue)>=0).length/Math.max(1,pmTotal)*100)}%"></div></div>

      <div class="kpi-card" style="--kpi-color:var(--cyan)">

      </div>
      <div class="kpi-card" style="--kpi-color:var(--accent2)">
        <div class="kpi-top"><div class="kpi-label">Breakdown Resolution</div><div class="kpi-icon" style="color:var(--accent2)">⚡</div></div>

};

/* ---- LIFECYCLE ---- */
RENDERERS.lifecycle=function(){
  const cards=DB.equipment.map(e=>{
    const uh=getUsageHours(e);
    const pct=e.expectedLifespanHours?Math.min(100,Math.round(uh/e.expectedLifespanHours*100)):0;
    const barCls=pct>=90?'p-red':pct>=70?'p-yellow':'p-green';
    const rem=e.expectedLifespanHours?Math.max(0,e.expectedLifespanHours-uh):null;
    const age=e.commissioningDate?Math.round((new Date()-new Date(e.commissioningDate))/86400000/365*10)/10:null;
    return `<div class="lc-card fade-up">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:16px">
        <div>
          <div class="lc-name">${e.name}</div>
          <div class="lc-meta">${e.id} · ${e.category} · ${e.location}</div>
        </div>
        ${statusBadge(e.status)}
      </div>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:12px">
        <div><div style="font-size:11px;color:var(--text3)">Age</div><div style="font-weight:600">${age?age+'y':'-'}</div></div>
        <div><div style="font-size:11px;color:var(--text3)">Usage Hours</div><div style="font-weight:600">${uh.toLocaleString()} h</div></div>
        <div><div style="font-size:11px;color:var(--text3)">Lifespan</div><div style="font-weight:600">${e.expectedLifespanHours?(e.expectedLifespanHours.toLocaleString()+' h'):'-'}</div></div>
        <div><div style="font-size:11px;color:var(--text3)">Remaining</div><div style="font-weight:600">${rem!==null?(rem.toLocaleString()+' h'):'-'}</div></div>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <div class="progress-track" style="flex:1"><div class="progress-fill ${barCls}" style="width:${pct}%"></div></div>
        <span style="font-size:12px;font-weight:700;color:${pct>=90?'var(--red)':pct>=70?'var(--yellow)':'var(--green)'}">${pct}%</span>
      </div>
    </div>`;
  });
  document.getElementById('pageContent').innerHTML=`<div class="fade-up" style="margin-bottom:8px;color:var(--text3);font-size:13px">Equipment lifespan and usage analysis</div>${cards.join('')}`;
};

/* ---- SCHEDULE ---- */
RENDERERS.schedule=function(){
  const now=new Date();
  const year=now.getFullYear();const month=now.getMonth();
  const firstDay=new Date(year,month,1).getDay();
  const daysInMonth=new Date(year,month+1,0).getDate();
  const monthStr=now.toLocaleString('default',{month:'long',year:'numeric'});
  // Build event map
  const events={};
  DB.pmSchedules.forEach(p=>{if(p.nextDue){const d=new Date(p.nextDue);if(d.getMonth()===month&&d.getFullYear()===year){const day=d.getDate();if(!events[day])events[day]=[];events[day].push({type:'PM',text:p.task,status:p.status});}}});
  DB.calibrations.forEach(c=>{if(c.nextDue){const d=new Date(c.nextDue);if(d.getMonth()===month&&d.getFullYear()===year){const day=d.getDate();if(!events[day])events[day]=[];events[day].push({type:'CAL',text:c.parameter});}}});
  const days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const cells=Array.from({length:firstDay},'').map(()=>'<div></div>').join('');
  const dayCells=Array.from({length:daysInMonth},(_,i)=>{
    const d=i+1;const isToday=d===now.getDate();const evs=events[d]||[];
    const hasOD=evs.some(e=>e.status==='Overdue');
    return `<div class="cal-cell${evs.length?' has-event':''}${hasOD?' overdue':''}" title="${evs.map(e=>e.text).join(', ')}">
      <span style="font-size:12px;font-weight:${isToday?'800':'500'};color:${isToday?'var(--accent)':'inherit'}">${d}</span>
      ${evs.length?`<span style="font-size:9px;color:${hasOD?'var(--red)':evs[0].type==='CAL'?'var(--accent2)':'var(--accent)'}">${evs.length}
